<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="100%" height="auto">
  <defs>
    <style>
      .label { font-family: monospace; font-size: 10px; font-weight: 700; letter-spacing: 2px; }
      .title { font-family: sans-serif; font-size: 15px; font-weight: 800; fill: #ffffff; }
      .example { font-family: monospace; font-size: 11px; fill: rgba(255,255,255,0.5); font-style: italic; }
      .tag { font-family: monospace; font-size: 11px; fill: rgba(255,255,255,0.75); }
      .arrow-label { font-family: monospace; font-size: 10px; fill: rgba(255,255,255,0.45); text-anchor: middle; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="#0f1117" rx="16"/>

  <!-- ══════════════════════════════════════
       BOX 1 - Widget Tree
       translate(24, 24) - move box here
       everything inside uses local coords
  ═══════════════════════════════════════ -->
  <g transform="translate(24, 24)">
    <rect x="0" y="0" width="270" height="232" fill="#1a1608" stroke="#c8a84b" stroke-width="1.5" rx="12"/>
    <text x="20" y="28" class="label" fill="#c8a84b">WIDGET TREE</text>
    <text x="20" y="50" class="title">What you write</text>
    <!-- example block -->
    <rect x="12" y="62" width="246" height="52" fill="rgba(255,255,255,0.04)" rx="6"/>
    <line x1="12" y1="62" x2="12" y2="114" stroke="#c8a84b" stroke-width="2.5" stroke-opacity="0.3"/>
    <text x="28" y="82" class="example">"I want a blue button,</text>
    <text x="28" y="98" class="example">200px wide"</text>
    <!-- tags -->
    <circle cx="24" cy="134" r="3" fill="#c8a84b"/>
    <text x="36" y="138" class="tag">Throwaway</text>
    <circle cx="24" cy="156" r="3" fill="#c8a84b"/>
    <text x="36" y="160" class="tag">Cheap to create</text>
    <circle cx="24" cy="178" r="3" fill="#c8a84b"/>
    <text x="36" y="182" class="tag">Rebuilt constantly</text>
  </g>

  <!-- ══════════════════════════════════════
       ARROW 1
       from x=294 to x=454, center x=374
  ═══════════════════════════════════════ -->
  <g transform="translate(294, 0)">
    <line x1="0" y1="134" x2="152" y2="134" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <polygon points="144,129 154,134 144,139" fill="rgba(255,255,255,0.25)"/>
    <text x="76" y="154" class="arrow-label">new widget config</text>
  </g>

  <!-- ══════════════════════════════════════
       BOX 2 - Element Tree
       translate(454, 24)
  ═══════════════════════════════════════ -->
  <g transform="translate(454, 24)">
    <rect x="0" y="0" width="270" height="232" fill="#0d1a12" stroke="#4caf7d" stroke-width="1.5" rx="12"/>
    <text x="20" y="28" class="label" fill="#4caf7d">ELEMENT TREE</text>
    <text x="20" y="50" class="title">What survives</text>
    <rect x="12" y="62" width="246" height="52" fill="rgba(255,255,255,0.04)" rx="6"/>
    <line x1="12" y1="62" x2="12" y2="114" stroke="#4caf7d" stroke-width="2.5" stroke-opacity="0.3"/>
    <text x="28" y="82" class="example">"Same widget as before,</text>
    <text x="28" y="98" class="example">just update the color"</text>
    <circle cx="24" cy="134" r="3" fill="#4caf7d"/>
    <text x="36" y="138" class="tag">Survives rebuilds</text>
    <circle cx="24" cy="156" r="3" fill="#4caf7d"/>
    <text x="36" y="160" class="tag">Diffs old vs new</text>
    <circle cx="24" cy="178" r="3" fill="#4caf7d"/>
    <text x="36" y="182" class="tag">Decides what changes</text>
  </g>

  <!-- ══════════════════════════════════════
       ARROW 2
       from x=724 to x=884, center x=804
  ═══════════════════════════════════════ -->
  <g transform="translate(724, 0)">
    <line x1="0" y1="134" x2="152" y2="134" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <polygon points="144,129 154,134 144,139" fill="rgba(255,255,255,0.25)"/>
    <text x="76" y="154" class="arrow-label">minimum updates</text>
  </g>

  <!-- ══════════════════════════════════════
       BOX 3 - Render Object Tree
       translate(884, 24)
  ═══════════════════════════════════════ -->
  <g transform="translate(884, 24)">
    <rect x="0" y="0" width="292" height="232" fill="#0d1320" stroke="#4a90d9" stroke-width="1.5" rx="12"/>
    <text x="20" y="28" class="label" fill="#4a90d9">RENDER OBJECT TREE</text>
    <text x="20" y="50" class="title">What actually draws</text>
    <rect x="12" y="62" width="268" height="52" fill="rgba(255,255,255,0.04)" rx="6"/>
    <line x1="12" y1="62" x2="12" y2="114" stroke="#4a90d9" stroke-width="2.5" stroke-opacity="0.3"/>
    <text x="28" y="82" class="example">"Width 200px, at x:50,</text>
    <text x="28" y="98" class="example">painting now..."</text>
    <circle cx="24" cy="134" r="3" fill="#4a90d9"/>
    <text x="36" y="138" class="tag">Expensive, but reused</text>
    <circle cx="24" cy="156" r="3" fill="#4a90d9"/>
    <text x="36" y="160" class="tag">Does the real work</text>
    <circle cx="24" cy="178" r="3" fill="#4a90d9"/>
    <text x="36" y="182" class="tag">Only updates when necessary</text>
  </g>

</svg>
